<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>#Mood</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --cream:      #FDF6EC;
      --sage:       #A8BBA0;
      --rose:       #E8B4BC;
      --amber:      #E8C99A;
      --sky:        #B8D4D8;
      --forest:     #3D4F35;
      --brown:      #3D3528;
      --warm-white: rgba(255, 250, 240, 0.88);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100dvh;
      background: var(--cream);
      color: var(--brown);
      font-family: 'Quicksand', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Background ───────────────────────────────────────────────────── */

    .bg-blobs { position: fixed; inset: 0; z-index: -2; overflow: hidden; pointer-events: none; }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.5;
    }
    .blob-1 { background: var(--sage);  width: 60vw; height: 60vw; top: -10%; left: -10%; animation: drift1 22s ease-in-out infinite; }
    .blob-2 { background: var(--rose);  width: 50vw; height: 50vw; bottom: -15%; right: -10%; animation: drift2 26s ease-in-out infinite; }
    .blob-3 { background: var(--amber); width: 45vw; height: 45vw; top: 30%; right: 5%; animation: drift3 18s ease-in-out infinite; }
    .blob-4 { background: var(--sky);   width: 40vw; height: 40vw; bottom: 15%; left: 5%; animation: drift4 24s ease-in-out infinite; }
    .blob-5 { background: rgba(255,250,240,0.7); width: 50vw; height: 50vw; top: 5%; left: 25%; animation: drift5 28s ease-in-out infinite; }

    @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(15vw,12vh) scale(1.1);} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-12vw,-15vh) scale(1.15);} }
    @keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-20vw,15vh) scale(0.9);} }
    @keyframes drift4 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(15vw,-12vh) scale(1.05);} }
    @keyframes drift5 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-8vw,8vh) scale(1.1);} }

    .grain {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      opacity: 0.5; mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
    }

    /* ── Screens ──────────────────────────────────────────────────────── */

    .screen {
      position: fixed; inset: 0;
      display: none; opacity: 0;
      transition: opacity 0.4s ease;
      padding: 2rem 1.25rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .screen.active { display: flex; opacity: 1; }

    #screen-input, #screen-loading, #screen-safety {
      flex-direction: column; justify-content: center; align-items: center;
    }
    #screen-result {
      flex-direction: column; align-items: center;
      padding-top: 3rem; padding-bottom: 3rem;
    }

    /* ── Logo / heading ───────────────────────────────────────────────── */

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem; letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--forest); opacity: 0.6;
      margin-bottom: 2.5rem; font-weight: 500;
    }
    .heading {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(3rem, 9vw, 4.5rem);
      color: var(--brown);
      text-align: center; line-height: 1.05;
      margin-bottom: 2.25rem; font-weight: 400;
    }

    /* ── Frosted card ─────────────────────────────────────────────────── */

    .card {
      background: var(--warm-white);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(61, 79, 53, 0.08);
      width: 100%; max-width: 420px;
    }

    /* ── Input card ───────────────────────────────────────────────────── */

    .input-card { padding: 1.25rem; }
    .input-card textarea {
      width: 100%;
      border: none; outline: none;
      background: transparent;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.0625rem;
      color: var(--brown);
      resize: none;
      min-height: 90px;
      line-height: 1.5;
    }
    .input-card textarea::placeholder {
      font-style: italic; color: var(--brown); opacity: 0.4;
    }
    .input-actions {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 0.85rem; margin-top: 0.5rem;
      border-top: 1px solid rgba(61, 53, 40, 0.08);
    }
    .mic-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--forest);
      background: transparent; color: var(--forest);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .mic-btn:hover { background: var(--forest); color: var(--cream); }
    .mic-btn.listening {
      background: #c66; color: white; border-color: #c66;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .mic-btn.hidden { display: none; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(204,102,102,0.55); }
      50%     { box-shadow: 0 0 0 12px rgba(204,102,102,0); }
    }
    .submit-btn {
      font-family: 'Quicksand', sans-serif;
      font-weight: 600; font-size: 0.95rem;
      letter-spacing: 0.01em;
      color: var(--forest); background: transparent;
      border: 1.5px solid var(--forest);
      padding: 0.65rem 1.35rem;
      border-radius: 999px;
      cursor: pointer; min-height: 44px;
      transition: background 0.2s, color 0.2s, opacity 0.2s;
    }
    .submit-btn:hover:not(:disabled) { background: var(--forest); color: var(--cream); }
    .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .error-msg {
      color: #b04545; font-size: 0.875rem;
      margin-top: 1rem; text-align: center;
      max-width: 420px;
    }

    /* ── Category chips ───────────────────────────────────────────────── */

    .vibe-row {
      width: 100%; max-width: 420px;
      margin-top: 1rem;
      display: flex; flex-direction: column;
      align-items: center;
    }
    .vibe-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--brown); opacity: 0.55;
      margin-bottom: 0.55rem;
      letter-spacing: 0.01em;
    }
    .categories {
      display: flex; flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
    }
    .cat-chip {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--forest);
      background: transparent;
      border: 1px solid rgba(61, 79, 53, 0.35);
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
      min-height: 32px;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .cat-chip:hover { background: rgba(61, 79, 53, 0.07); }
    .cat-chip.selected {
      background: var(--sage);
      border-color: var(--sage);
      color: var(--brown);
    }

    /* ── Loading ──────────────────────────────────────────────────────── */

    .loading-video {
      width: min(280px, 65vh);
      height: auto;
      aspect-ratio: 828 / 1108;
      border-radius: 18px;
      object-fit: cover;
      filter: drop-shadow(0 10px 28px rgba(61, 79, 53, 0.2));
    }
    .loading-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.4rem;
      color: var(--brown); opacity: 0.75;
      margin-top: 1.75rem;
      letter-spacing: 0.01em;
      text-align: center;
    }
    .loading-dot {
      display: inline-block;
      animation: blink 1.4s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

    /* ── Result card ──────────────────────────────────────────────────── */

    .result-card {
      width: 100%; max-width: 390px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .album-art-wrap {
      width: 100%; aspect-ratio: 1 / 1;
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, var(--sage), var(--amber), var(--rose));
    }
    .album-art-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transform-origin: 50% 50%;
      animation: kenBurns 14s ease-in-out infinite alternate;
      will-change: transform;
    }
    @keyframes kenBurns {
      0%   { transform: scale(1.02) translate(0, 0); }
      100% { transform: scale(1.14) translate(-3%, 2.5%); }
    }

    /* Warm light pulse overlay */
    .album-art-wrap::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 38%, rgba(255, 215, 150, 0.45), transparent 65%);
      mix-blend-mode: soft-light;
      animation: warmPulse 5s ease-in-out infinite alternate;
      z-index: 2;
    }
    @keyframes warmPulse {
      0%   { opacity: 0.4; }
      100% { opacity: 1; }
    }

    /* Play button overlay */
    .play-btn {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 64px; height: 64px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 250, 240, 0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 16px rgba(61, 79, 53, 0.18);
      color: var(--brown);
      cursor: pointer;
      display: none;
      align-items: center; justify-content: center;
      z-index: 4;
      transition: transform 0.18s, opacity 0.25s;
      opacity: 0;
    }
    .play-btn.visible { display: flex; opacity: 1; }
    .play-btn.hidden-while-playing { opacity: 0; pointer-events: none; }
    .album-art-wrap:hover .play-btn.hidden-while-playing { opacity: 1; pointer-events: auto; }
    .play-btn:active { transform: translate(-50%, -50%) scale(0.93); }
    .play-btn svg { width: 26px; height: 26px; }
    .play-btn .icon-pause { display: none; }
    .play-btn.playing .icon-play { display: none; }
    .play-btn.playing .icon-pause { display: block; }

    /* Preview progress bar (bottom of album art) */
    .preview-progress {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 3px;
      background: rgba(255, 250, 240, 0.25);
      z-index: 4;
      display: none;
    }
    .preview-progress.visible { display: block; }
    .preview-progress-fill {
      height: 100%; width: 0%;
      background: var(--cream);
      box-shadow: 0 0 8px rgba(255, 240, 200, 0.7);
      transition: width 0.1s linear;
    }

    /* Floating dust motes — sit above the cover as a soft filter */
    .particles {
      position: absolute; inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 5;
      opacity: 0.3;
    }
    .particle {
      position: absolute; bottom: 0;
      border-radius: 50%;
      background: rgba(255, 248, 220, 1);
      box-shadow: 0 0 8px 2px rgba(255, 230, 170, 0.9);
      animation: float linear infinite;
      will-change: transform, opacity;
    }
    @keyframes float {
      0%   { transform: translate3d(0, 20%, 0) scale(0.6); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translate3d(var(--sway, 0), -110%, 0) scale(1); opacity: 0; }
    }
    .album-art-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--sage), var(--amber), var(--rose));
      background-size: 200% 200%;
      animation: gradientShift 4s ease-in-out infinite;
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50%; }
      50%     { background-position: 100% 50%; }
    }
    .placeholder-cat {
      width: 72px; height: 72px;
      animation: pulseCat 2s ease-in-out infinite;
    }
    @keyframes pulseCat {
      0%,100% { transform: scale(1); opacity: 0.75; }
      50%     { transform: scale(1.08); opacity: 1; }
    }

    .result-body { padding: 1.4rem; text-align: center; }
    .one-liner {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 3.2vw, 1.1rem);
      line-height: 1.4;
      color: var(--brown);
      margin-bottom: 1.65rem;
      font-weight: 500;
      text-align: center;
      text-wrap: balance;
      overflow-wrap: break-word;
    }
    .song-title {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: clamp(1.05rem, 3.4vw, 1.15rem);
      color: var(--brown);
      line-height: 1.3;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .artist {
      font-family: 'Quicksand', sans-serif;
      font-size: clamp(0.85rem, 2.8vw, 0.95rem);
      color: var(--forest); opacity: 0.78;
      margin-top: 0.35rem;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .key-lyric {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--brown); opacity: 0.78;
      border-left: 2px solid var(--sage);
      padding-left: 0.85rem;
      margin-top: 1.15rem;
      line-height: 1.5;
      text-align: left;
    }

    /* When the card is being captured for share/save, keep the export clean:
       hide controls, freeze the Ken-Burns zoom in a balanced mid-state. */
    .result-card.rendering .play-btn,
    .result-card.rendering .preview-progress {
      display: none !important;
    }
    .result-card.rendering .album-art-wrap img {
      animation: none !important;
      transform: scale(1.04) translate(-0.75%, 0.6%) !important;
    }

    /* Mobile: shrink album art so all four card elements fit in the viewport
       without scrolling. Album art keeps its square aesthetic via object-fit
       cover, but the wrapper is capped at 38vh on tall phones / smaller %
       on shorter ones. */
    @media (max-width: 600px) {
      #screen-result {
        padding-top: 1.25rem;
        padding-bottom: 1.25rem;
      }
      .result-card {
        max-width: min(360px, 92vw);
      }
      .album-art-wrap {
        max-height: 38vh;
      }
      .result-body {
        padding: 1.1rem 1.05rem;
      }
      .one-liner {
        margin-bottom: 1.1rem;
      }
      .key-lyric {
        margin-top: 0.9rem;
        font-size: 0.95rem;
      }
      .streaming-row { margin-bottom: 0.75rem; }
      .streaming-label { margin-bottom: 0.35rem; }
      .actions-row { margin-bottom: 0.5rem; }
    }

    /* Very short phones (iPhone SE-ish) — cap album art harder */
    @media (max-height: 700px) {
      .album-art-wrap { max-height: 32vh; }
      .one-liner { margin-bottom: 0.85rem; }
      .key-lyric { margin-top: 0.7rem; }
      .result-body { padding: 0.95rem; }
    }

    /* ── Streaming links row ──────────────────────────────────────────── */

    .streaming-row {
      width: 100%; max-width: 390px;
      margin-bottom: 1.1rem;
      display: flex; flex-direction: column;
      align-items: center;
    }
    .streaming-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--brown); opacity: 0.55;
      margin-bottom: 0.5rem;
      letter-spacing: 0.01em;
    }
    .streaming-buttons {
      display: flex; gap: 0.5rem;
      width: 100%;
    }
    .stream-btn {
      flex: 1;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      font-size: 0.82rem;
      color: var(--forest);
      background: rgba(255, 250, 240, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(61, 79, 53, 0.22);
      padding: 0.6rem 0.5rem;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: flex; align-items: center; justify-content: center;
      gap: 0.25rem;
      min-height: 40px;
      transition: background 0.18s, border-color 0.18s, transform 0.1s;
    }
    .stream-btn:hover { background: rgba(255, 250, 240, 0.92); border-color: rgba(61, 79, 53, 0.4); }
    .stream-btn:active { transform: scale(0.97); }
    .stream-btn[hidden] { display: none; }

    .actions-row {
      display: flex; gap: 0.75rem;
      width: 100%; max-width: 390px;
      margin-bottom: 0.75rem;
    }
    .action-btn {
      flex: 1;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600; font-size: 0.95rem;
      padding: 0.9rem 1rem;
      border-radius: 999px;
      cursor: pointer; border: none;
      min-height: 44px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .action-btn:active { transform: scale(0.97); }
    .share-btn { background: var(--forest); color: var(--cream); }
    .save-btn  { background: rgba(255,250,240,0.92); color: var(--brown); border: 1.5px solid rgba(61,53,40,0.18); }
    .ghost-btn {
      width: 100%; max-width: 390px;
      background: transparent; border: none;
      color: var(--forest); opacity: 0.4;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.9rem; padding: 0.75rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .ghost-btn:hover { opacity: 0.7; }

    /* ── Share sheet (bottom sheet) ────────────────────────────────────── */

    .share-sheet {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      justify-content: flex-end;
    }
    .share-sheet[hidden] { display: none; }
    .share-sheet-backdrop {
      position: absolute; inset: 0;
      background: rgba(61, 53, 40, 0.45);
      backdrop-filter: blur(2px);
      animation: shareFadeIn 0.22s ease forwards;
    }
    .share-sheet-panel {
      position: relative;
      background: var(--cream);
      border-radius: 26px 26px 0 0;
      padding: 0.65rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0));
      box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.18);
      animation: shareSlideUp 0.28s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }
    @keyframes shareFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes shareSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .share-sheet-handle {
      width: 38px; height: 4px;
      background: rgba(61, 53, 40, 0.2);
      border-radius: 2px;
      margin: 0 auto 0.9rem;
    }
    .share-sheet-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--brown);
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .share-sheet-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem;
      margin-bottom: 1.25rem;
    }
    .share-dest {
      display: flex; flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--brown);
      padding: 0.5rem 0.25rem;
      border-radius: 12px;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .share-dest:active { transform: scale(0.94); background: rgba(61, 79, 53, 0.08); }
    .share-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white;
    }
    .share-icon svg { width: 24px; height: 24px; }
    .share-icon.ig {
      background: linear-gradient(135deg, #feda77 0%, #f58529 25%, #dd2a7b 50%, #8134af 75%, #515bd4 100%);
    }
    .share-icon.wa { background: #25D366; }
    .share-icon.x  { background: #000000; }
    .share-icon.sms { background: #34C759; }
    .share-icon.copy { background: rgba(61, 79, 53, 0.85); }
    .share-icon.more { background: var(--brown); }

    .share-sheet-cancel {
      width: 100%;
      background: rgba(61, 79, 53, 0.08);
      border: none;
      padding: 0.9rem;
      border-radius: 14px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--brown);
      cursor: pointer;
      min-height: 44px;
    }
    .share-sheet-cancel:active { background: rgba(61, 79, 53, 0.18); }

    .share-toast {
      position: fixed;
      bottom: calc(1.5rem + env(safe-area-inset-bottom, 0));
      left: 50%;
      transform: translateX(-50%);
      background: var(--brown);
      color: var(--cream);
      font-family: 'Quicksand', sans-serif;
      font-size: 0.875rem;
      padding: 0.65rem 1.1rem;
      border-radius: 999px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      z-index: 200;
      animation: toastIn 0.2s ease, toastOut 0.3s ease 1.5s forwards;
    }
    @keyframes toastIn  { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes toastOut { to   { opacity: 0; transform: translate(-50%, 10px); } }

    /* ── Safety ───────────────────────────────────────────────────────── */

    .safety-card { padding: 2rem 1.5rem; text-align: left; max-width: 420px; }
    .safety-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--brown);
      margin-bottom: 1rem;
      text-align: center;
      font-weight: 500;
    }
    .safety-card p {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.95rem;
      color: var(--brown);
      line-height: 1.6;
      margin-bottom: 0.8rem;
      white-space: pre-wrap;
    }
    .safety-back-btn {
      margin-top: 1.5rem; width: 100%;
      background: transparent;
      border: 1.5px solid var(--forest);
      color: var(--forest);
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      padding: 0.85rem;
      border-radius: 999px;
      cursor: pointer; min-height: 44px;
      transition: background 0.2s, color 0.2s;
    }
    .safety-back-btn:hover { background: var(--forest); color: var(--cream); }
  </style>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>

  <div id="screen-input" class="screen active">

  <!-- ── SHARE SHEET (bottom modal) ────────────────────────────────────── -->
  <div id="share-sheet" class="share-sheet" hidden>
    <div class="share-sheet-backdrop" id="share-backdrop"></div>
    <div class="share-sheet-panel" role="dialog" aria-label="Share this">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>

          </span>

  <!-- ── SAFETY ────────────────────────────────────────────────────────── -->
  <div id="screen-safety" class="screen">
    <div class="card safety-card">
      <h2>This is bigger than a song.</h2>
      <p id="safety-message"></p>
      <button class="safety-back-btn" id="safety-back-btn">← back</button>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────
    const API_BASE = window.location.origin;
    const SESSION_KEY = 'mood-session-id';
    let sessionId = localStorage.getItem(SESSION_KEY);
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem(SESSION_KEY, sessionId);
    }
    let usedSongs = [];
    let currentResult = null;
    let selectedCategory = null;

    // ── DOM ────────────────────────────────────────────────────────────
    const $ = (id) => document.getElementById(id);
    const screens = ['screen-input', 'screen-loading', 'screen-result', 'screen-safety'];

    function showScreen(id) {
      screens.forEach(s => $(s).classList.toggle('active', s === id));
      if (id !== 'screen-result') stopPreview();
    }

    // ── Input ──────────────────────────────────────────────────────────
    const promptInput = $('prompt-input');
    const submitBtn = $('submit-btn');
    const errorMsg = $('error-msg');

    promptInput.addEventListener('input', () => {
      submitBtn.disabled = promptInput.value.trim().length === 0;
      promptInput.style.height = 'auto';
      promptInput.style.height = promptInput.scrollHeight + 'px';
    });

    submitBtn.addEventListener('click', submitPrompt);
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submitPrompt();
    });

    // Category chips — single-select, click again to deselect
    document.querySelectorAll('.cat-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const cat = chip.dataset.cat;
        if (selectedCategory === cat) {
          selectedCategory = null;
          chip.classList.remove('selected');
        } else {
          document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
          selectedCategory = cat;
        }
      });
    });

    async function submitPrompt() {
      const prompt = promptInput.value.trim();
      if (!prompt) return;
      errorMsg.style.display = 'none';
      showScreen('screen-loading');

      try {
        const resp = await fetch(`${API_BASE}/api/recommend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt,
            session_id: sessionId,
            used_songs: usedSongs,
            category: selectedCategory,
          }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error || `server returned ${resp.status}`);
        }
        const data = await resp.json();

        if (data.safety) {
          $('safety-message').textContent = data.message;
          showScreen('screen-safety');
          return;
        }

        currentResult = data;
        usedSongs.push(`${data.song_title} by ${data.artist}`);
        renderResult(data);
        showScreen('screen-result');
        logEvent('view');
      } catch (e) {
        errorMsg.textContent = `something went wrong: ${e.message}`;
        errorMsg.style.display = 'block';
        showScreen('screen-input');
      }
    }

    // ── Particles ──────────────────────────────────────────────────────
    function spawnParticles(n = 22) {
      const root = $('particles');
      root.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        const size = 2.5 + Math.random() * 4;
        const left = Math.random() * 100;
        const delay = -Math.random() * 16;
        const duration = 9 + Math.random() * 10;
        const sway = (Math.random() - 0.5) * 50;
        p.style.cssText =
          `width:${size}px;height:${size}px;` +
          `left:${left}%;` +
          `animation-delay:${delay}s;` +
          `animation-duration:${duration}s;` +
          `--sway:${sway}px;`;
        root.appendChild(p);
      }
    }

    // ── Audio preview ──────────────────────────────────────────────────
    const audio = $('preview-audio');
    const playBtn = $('play-btn');
    const progress = $('preview-progress');
    const progressFill = $('preview-progress-fill');

    function setPreview(url) {
      stopPreview();
      audio.src = '';
      progressFill.style.width = '0%';
      if (!url) {
        playBtn.classList.remove('visible');
        progress.classList.remove('visible');
        return;
      }
      audio.src = url;
      playBtn.classList.add('visible');
      progress.classList.add('visible');
    }

    function playPreview() {
      audio.play().then(() => {
        playBtn.classList.add('playing', 'hidden-while-playing');
      }).catch(() => { /* autoplay blocked — user can tap */ });
    }

    function pausePreview() {
      audio.pause();
      playBtn.classList.remove('playing', 'hidden-while-playing');
    }

    function stopPreview() {
      audio.pause();
      try { audio.currentTime = 0; } catch (e) {}
      progressFill.style.width = '0%';
      playBtn.classList.remove('playing', 'hidden-while-playing');
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) playPreview();
      else pausePreview();
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      }
    });
    audio.addEventListener('ended', () => {
      playBtn.classList.remove('playing', 'hidden-while-playing');
      progressFill.style.width = '0%';
    });

    // ── Render result ──────────────────────────────────────────────────
    function renderResult(d) {
      $('one-liner').textContent = `“${d.one_liner}”`;
      $('song-title').textContent = d.song_title;
      $('artist').textContent = d.artist;
      $('key-lyric').textContent = `"${d.key_lyric}"`;
      spawnParticles();
      setPreview(d.preview_url);

      // Streaming deep links — hide any service that has no URL
      const links = d.streaming_links || {};
      const services = [
        ['link-spotify', links.spotify, 'spotify'],
        ['link-apple',   links.apple_music, 'apple_music'],
        ['link-youtube', links.youtube, 'youtube'],
      ];
      services.forEach(([id, url, key]) => {
        const el = $(id);
        if (url) {
          el.href = url;
          el.hidden = false;
          el.onclick = () => logEvent('open_' + key);
        } else {
          el.hidden = true;
        }
      });

      const img = $('album-art');
      const ph = $('art-placeholder');
      img.style.display = 'none';
      ph.style.display = 'flex';

      if (d.album_art_url) {
        // Same-origin if it starts with "/", else proxy through backend
        const src = d.album_art_url.startsWith('/')
          ? `${API_BASE}${d.album_art_url}`
          : `${API_BASE}/api/art-proxy?url=${encodeURIComponent(d.album_art_url)}`;
        const tmp = new Image();
        tmp.crossOrigin = 'anonymous';
        tmp.onload = () => {
          img.src = src;
          img.style.display = 'block';
          ph.style.display = 'none';
          if (d.preview_url) playPreview();
        };
        tmp.onerror = () => {
          if (d.preview_url) playPreview();
        };
        tmp.src = src;
      } else if (d.preview_url) {
        playPreview();
      }
    }

    // ── Voice input ────────────────────────────────────────────────────
    const micBtn = $('mic-btn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onresult = (e) => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) final += t;
          else interim += t;
        }
        promptInput.value = (final || interim).trim();
        promptInput.dispatchEvent(new Event('input'));
      };
      recognition.onend = () => {
        listening = false;
        micBtn.classList.remove('listening');
      };
      recognition.onerror = () => {
        listening = false;
        micBtn.classList.remove('listening');
      };

      micBtn.addEventListener('click', () => {
        if (listening) {
          recognition.stop();
        } else {
          try {
            recognition.start();
            listening = true;
            micBtn.classList.add('listening');
          } catch (e) { /* already started */ }
        }
      });
    } else {
      micBtn.classList.add('hidden');
    }

    // ── Card → PNG blob ────────────────────────────────────────────────
    // Renders the result card to a clean PNG (controls hidden, animations
    // frozen mid-state). Used by both share and save.
    async function renderCardToBlob() {
      const card = $('result-card');
      card.classList.add('rendering');
      // Let CSS apply before html2canvas reads computed styles
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      try {
        const canvas = await html2canvas(card, {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          allowTaint: false,
          logging: false,
        });
        return await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      } finally {
        card.classList.remove('rendering');
      }
    }

    function isMobile() {
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) return true;
      // iPadOS Safari reports as Macintosh; touch points disambiguates
      return navigator.maxTouchPoints > 1 && /Mac/i.test(navigator.userAgent);
    }

    function shareText() {
      return (
        `${currentResult.song_title} — ${currentResult.artist}\n` +
        `"${currentResult.key_lyric}"\n\n` +
        `${currentResult.one_liner}\n\n` +
        `#mood ${window.location.origin}`
      );
    }

    function fileFromBlob(blob, name) {
      return new File([blob], name, { type: 'image/png' });
    }

    function flashBtn(btn, label, ms = 1800) {
      const orig = btn.dataset.origLabel || btn.textContent;
      btn.dataset.origLabel = orig;
      btn.textContent = label;
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = orig;
        btn.disabled = false;
      }, ms);
    }

    // ── Share sheet ────────────────────────────────────────────────────
    const shareSheet = $('share-sheet');
    function openShareSheet() {
      if (!currentResult) return;
      shareSheet.hidden = false;
    }
    function closeShareSheet() {
      shareSheet.hidden = true;
    }
    function showToast(msg) {
      // Remove any existing toast first
      const existing = document.querySelector('.share-toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.className = 'share-toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2200);
    }
    $('share-btn').addEventListener('click', openShareSheet);
    $('share-backdrop').addEventListener('click', closeShareSheet);
    $('share-cancel').addEventListener('click', closeShareSheet);

    // Per-destination handlers. Most of these use intent URLs / deep links
    // that open the target app with text pre-filled. Image-attaching destinations
    // route through "More" (system share sheet).
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    const shareDestHandlers = {
      instagram: async () => {
        // Two-step chain: open system share sheet so the user can save the
        // card to Photos OR pick Instagram directly; then deep-link into IG
        // so they land where they intended (Story library has the saved card).
        try {
          const blob = await renderCardToBlob();
          const file = fileFromBlob(blob, 'mood-card.png');
          if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: '#Mood' });
            // Share resolved (user saved or shared to a destination) → open IG
            setTimeout(() => { window.location.href = 'instagram://app'; }, 400);
          } else {
            // No file-share support (e.g. desktop) — just open IG
            window.location.href = 'instagram://app';
          }
          logEvent('share_instagram');
        } catch (e) {
          // AbortError = user cancelled the share sheet; do NOT redirect
          if (e && e.name !== 'AbortError') console.error('instagram share:', e);
        } finally {
          closeShareSheet();
        }
      },
      whatsapp: () => {
        window.location.href = `whatsapp://send?text=${encodeURIComponent(shareText())}`;
        logEvent('share_whatsapp');
        setTimeout(closeShareSheet, 300);
      },
      twitter: () => {
        const text = shareText();
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
        window.open(url, '_blank', 'noopener');
        logEvent('share_twitter');
        closeShareSheet();
      },
      sms: () => {
        const text = encodeURIComponent(shareText());
        // iOS uses &body=, Android uses ?body=
        window.location.href = `sms:${isIOS ? '&' : '?'}body=${text}`;
        logEvent('share_sms');
        setTimeout(closeShareSheet, 300);
      },
      copy: async () => {
        try {
          await navigator.clipboard.writeText(shareText());
          logEvent('share_copy');
          closeShareSheet();
          showToast('copied to clipboard');
        } catch (e) {
          closeShareSheet();
          showToast("couldn't copy — long-press text instead");
        }
      },
      more: async () => {
        closeShareSheet();
        try {
          const blob = await renderCardToBlob();
          const file = fileFromBlob(blob, 'mood-card.png');
          if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], text: shareText(), title: '#Mood' });
            logEvent('share_more');
          } else if (navigator.share) {
            await navigator.share({ text: shareText(), title: '#Mood' });
            logEvent('share_more');
          } else {
            await navigator.clipboard.writeText(shareText());
            logEvent('share_copy');
            showToast('copied to clipboard');
          }
        } catch (e) {
          if (e && e.name !== 'AbortError') {
            console.error('more share failed:', e);
          }
        }
      },
    };
    document.querySelectorAll('.share-dest').forEach(btn => {
      btn.addEventListener('click', () => {
        const dest = btn.dataset.dest;
        if (shareDestHandlers[dest]) shareDestHandlers[dest]();
      });
    });

    // ── Save card ──────────────────────────────────────────────────────
    // On mobile: open the share sheet so the user can "Save Image" (iOS) or
    // "Save to Gallery" (Android). On desktop: trigger a real download.
    $('save-btn').addEventListener('click', async () => {
      if (!currentResult) return;
      const btn = $('save-btn');
      btn.textContent = 'rendering…';
      btn.disabled = true;

      try {
        const blob = await renderCardToBlob();
        const file = fileFromBlob(blob, 'mood-card.png');

        if (isMobile() && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: '#Mood' });
            logEvent('save');
            flashBtn(btn, 'saved ✓');
            return;
          } catch (e) {
            if (e && e.name === 'AbortError') {
              btn.textContent = 'save card';
              btn.disabled = false;
              return;
            }
            // fall through to download
          }
        }

        // Desktop / no share-files support → download via object URL
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = 'mood-card.png';
        link.href = url;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        logEvent('save');
        flashBtn(btn, 'saved ✓');
      } catch (e) {
        console.error('save failed:', e);
        btn.textContent = 'save card';
        btn.disabled = false;
      }
    });

    // ── Try again ──────────────────────────────────────────────────────
    $('again-btn').addEventListener('click', () => {
      promptInput.value = '';
      promptInput.style.height = 'auto';
      submitBtn.disabled = true;
      showScreen('screen-input');
      promptInput.focus();
    });

    // ── Safety back ────────────────────────────────────────────────────
    $('safety-back-btn').addEventListener('click', () => {
      promptInput.value = '';
      submitBtn.disabled = true;
      showScreen('screen-input');
    });

    // ── Events ─────────────────────────────────────────────────────────
    function logEvent(type) {
      if (!currentResult) return;
      fetch(`${API_BASE}/api/event`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          recommendation_id: currentResult.recommendation_id,
          session_id: sessionId,
          event_type: type,
        }),
      }).catch(() => {});
    }
  </script>
</body>
</html>
